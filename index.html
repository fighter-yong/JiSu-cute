<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리의 결혼식에 초대합니다</title>
    <!-- 구글 폰트: 마루부리 세리프체와 손글씨 느낌의 나눔손글씨 사용 -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Maru+Buri:wght@300;400&family=Nanum+Pen+Script&display=swap">
    
    <style>
        /* 전체 기본 스타일 (한지 무드의 따뜻한 미색 배경) */
        body {
            margin: 0;
            padding: 0;
            background-color: #FDFBF7; 
            font-family: 'Maru+Buri', Georgia, serif;
            color: #333333;
            text-align: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 450px; /* 스마트폰 화면 최대 폭 고정 */
            margin: 0 auto;
            background-color: #FDFBF7;
            box-shadow: 0 0 20px rgba(0,0,0,0.02);
        }

        section {
            padding: 50px 20px;
        }

        /* 1. 메인 섹션 */
        .main-section {
            padding-top: 60px;
        }
        .main-title {
            font-family: 'Nanum Pen Script', cursive;
            font-size: 1.8rem;
            line-height: 1.5;
            color: #555555;
            margin-bottom: 30px;
        }
        .photo-frame {
            width: 85%;
            margin: 0 auto;
            border: 1px solid #EAE6DF;
            padding: 8px;
            background-color: #FFFFFF;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }
        .photo-frame img {
            width: 100%;
            display: block;
        }
        .credit {
            font-size: 0.75rem;
            color: #888888;
            margin-top: 12px;
            font-style: italic;
            margin-bottom: 25px;
        }

        /* BGM 버튼 디자인 정의 */
        .bgm-button {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #C2B39E;
            padding: 8px 16px;
            font-size: 0.75rem;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            color: #555555;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }

        /* 2. 인사말 섹션 */
        .intro-section {
            background-color: #F9F6F0; /* 약간 더 짙은 한지 톤 */
            border-top: 1px solid #EAE6DF;
            border-bottom: 1px solid #EAE6DF;
        }
        .intro-text {
            font-size: 0.95rem;
            line-height: 2;
            color: #444444;
            margin-bottom: 30px;
        }
        .names {
            font-size: 1.1rem;
            letter-spacing: 2px;
            font-weight: 400;
        }

        /* 3. 오시는 길 섹션 */
        .map-section img {
            width: 90%;
            max-width: 350px;
            margin: 20px auto;
            border: 1px solid #EAE6DF;
        }
        .map-btn {
            display: inline-block;
            background-color: #6E7F6A; /* 차분한 그린 톤 */
            color: #FFFFFF;
            text-decoration: none;
            padding: 12px 30px;
            font-size: 0.85rem;
            border-radius: 4px;
            margin-top: 15px;
            letter-spacing: 1px;
            transition: background-color 0.2s;
        }
        .map-btn:hover {
            background-color: #5A6A57;
        }

        /* 4. 마음 전하실 곳 섹션 */
        .bank-section {
            padding-bottom: 80px;
        }
        .flower-icon {
            font-size: 1.2rem;
            color: #C2B39E;
            margin-bottom: 15px;
        }
        .thankyou-text {
            font-size: 0.9rem;
            line-height: 1.8;
            color: #666666;
        }
    </style>
</head>
<body>

    <!-- BGM 오디오 태그 (자동재생, 반복재생 설정) -->
    <!-- ⚠️ 깃허브에 올릴 음악 파일명을 정확히 'wedding-bgm.mp3' 또는 'wedding-bgm.m4a' 등으로 맞추고 아래 src도 통일해 주세요 -->
    <audio id="bgm" src="wedding-bgm.mp3" autoplay loop></audio>

    <div class="container">
        
        <!-- [1면 연동] 메인 섹션 -->
        <section class="main-section">
            <div class="main-title">
                우리의 결혼식에<br>당신을 초대하고 싶습니다.
            </div>
            <div class="photo-frame">
                <!-- ⚠️ 깃허브에 올린 사진 파일명과 완벽히 일치해야 합니다 (대소문자 주의) -->
                <img src="wedding-photo.jpg" alt="결혼식 스냅 사진">
            </div>
            <div class="credit">photographed by 상헌lee</div>

            <!-- 음악 컨트롤 버튼 (하객들이 누르기 가장 좋은 메인 하단에 배치) -->
            <button id="bgmBtn" class="bgm-button" onclick="toggleBgm()">🎵 BGM 재생 중</button>
        </section>

        <!-- [2면 연동] 인사말 섹션 -->
        <section class="intro-section">
            <div class="intro-text">
                서로 다른 색으로 살아온 저희가<br>
                이제 하나의 뜻으로 발을 맞추려 합니다.<br>
                따뜻한 마음으로 곁에서 지켜봐 주시고<br>
                앞날을 축복해 주시면 감사하겠습니다.
            </div>
            <div class="names">
                용욱 &nbsp;&middot;&nbsp; 지수
            </div>
        </section>

        <!-- [3면 연동] 오시는 길 섹션 -->
        <section class="map-section">
            <div style="font-size: 1.05rem; margin-bottom: 10px;">오시는 길</div>
            <div style="font-size: 0.85rem; color: #777777;">W웨딩 국민연금홀 (부산 연제구 중앙대로 1000)</div>
            
            <!-- ⚠️ 깃허브에 올린 약도 이미지 파일명과 일치해야 합니다 -->
            <img src="wedding-map.png" alt="W웨딩 국민연금홀 약도">
            
            <br>
            <!-- 네이버 지도 바로가기 버튼 링크 -->
            <a href="https://map.naver.com/v5/search/W%EC%9B%A8%EB%94%A9%20%EA%B5%AD%EB%AF%BC%EC%97%B0%EA%B8%88%ED%99%80" class="map-btn" target="_blank">
                네이버 지도로 보기
            </a>
        </section>

        <!-- [4면 연동] 마음 전하실 곳 섹션 -->
        <section class="bank-section">
            <div class="flower-icon">❀</div>
            <div class="thankyou-text">
                바쁜 걸음으로 저희의 시작을<br>
                축하해 주셔서 진심으로 감사합니다.<br>
                보내주신 따뜻한 마음을 늘 기억하며,<br>
                가정에 건강과 행복이 가득하시기를 기원합니다.
            </div>
        </section>

    </div>

    <!-- 기능 제어 스크립트 (body 닫히기 직전 위치) -->
    <script>
    function toggleBgm() {
        var bgm = document.getElementById('bgm');
        var btn = document.getElementById('bgmBtn');
        
        if (bgm.paused) {
            bgm.play();
            btn.innerText = '🎵 BGM 재생 중';
            btn.style.opacity = '1';
        } else {
            bgm.pause();
            btn.innerText = '🔇 BGM 꺼짐';
            btn.style.opacity = '0.6';
        }
    }
    </script>
</body>
</html>
